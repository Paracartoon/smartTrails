{% extends "admin/base_site.html" %}
{% load static %}

{% block title %}Sensor Dashboard{% endblock %}

{% block content %}
<h1>Sensor Dashboard</h1>

<div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px;">

    <div style="background: #1f1f1f; border-radius: 8px; padding: 10px;">
        <h3 style="color: #fff; margin: 0 0 10px 0;">Temperature (°C)</h3>
        <iframe src="https://smart-trails.com/grafana/d-solo/ad7hg5x/smarttrails?orgId=1&panelId=1"
                width="100%" height="200" frameborder="0"></iframe>
    </div>

    <div style="background: #1f1f1f; border-radius: 8px; padding: 10px;">
        <h3 style="color: #fff; margin: 0 0 10px 0;">Light Intensity</h3>
        <iframe src="https://smart-trails.com/grafana/d-solo/ad7hg5x/smarttrails?orgId=1&panelId=3"
                width="100%" height="200" frameborder="0"></iframe>
    </div>

    <div style="background: #1f1f1f; border-radius: 8px; padding: 10px;">
        <h3 style="color: #fff; margin: 0 0 10px 0;">CO2 (ppm)</h3>
        <iframe src="https://smart-trails.com/grafana/d-solo/ad7hg5x/smarttrails?orgId=1&panelId=4"
                width="100%" height="200" frameborder="0"></iframe>
    </div>

    <div style="background: #1f1f1f; border-radius: 8px; padding: 10px;">
        <h3 style="color: #fff; margin: 0 0 10px 0;">Pressure Swing</h3>
        <iframe src="https://smart-trails.com/grafana/d-solo/ad7hg5x/smarttrails?orgId=1&panelId=5"
                width="100%" height="200" frameborder="0"></iframe>
    </div>

</div>

<p style="margin-top: 20px;">
    <a href="https://smart-trails.com/grafana/" target="_blank" style="color: #417690;">
        Open full Grafana dashboard →
    </a>
</p>
{% endblock %}
